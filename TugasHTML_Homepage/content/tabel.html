<!DOCTYPE html>
<html>
<head>
    <title>Simple HTML Table</title>
</head>
<body>

<h2>Student Information</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Grade</th>
    </tr>
    <tr>
        <td>Alice</td>
        <td>14</td>
        <td>9</td>
    </tr>
    <tr>
        <td>Bob</td>
        <td>15</td>
        <td>10</td>
    </tr>
    <tr>
        <td>Charlie</td>
        <td>14</td>
        <td>9</td>
    </tr>
</table>

</body>
</html>
