        <script>
            function skipTo(anchorId) {
                // 1. Find the 'maincontent' frame from the parent
                var targetFrame = parent.frames["maincontent"];
                
                // 2. Set the "hash" (the part after #) of that frame's URL
                // This forces the browser to scroll to that ID on the CURRENT page
                targetFrame.location.hash = anchorId;
            }
        </script>
    </head>
